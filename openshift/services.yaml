apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: json-server
  labels:
    app: json-server
spec:
  selector:
    app: json-server
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
