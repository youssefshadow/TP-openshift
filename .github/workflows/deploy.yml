name: CI/CD OpenShift

on:
  push:
    branches: ["main", "master"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install OpenShift CLI
        run: |
          curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/oc/latest/linux/oc.tar.gz
          tar -xvf oc.tar.gz
          sudo mv oc /usr/local/bin/
          oc version --client

      - name: Login to OpenShift
        run: |
          oc login --server=${{ secrets.OPENSHIFT_SERVER }} --token=${{ secrets.OPENSHIFT_TOKEN }} --insecure-skip-tls-verify

      - name: Start OpenShift Builds
        run: |
          # 1. Selection du projet
          oc project ${{ secrets.OPENSHIFT_NAMESPACE }}

          # 2. Verification des fichiers
          echo "Verification du dossier backend..."
          ls -d docker/backend

          # 3. Build du Backend
          echo "Demarrage build Backend"
          oc start-build json-server --from-dir=docker/backend --follow

          # 4. Build du Frontend
          echo "Demarrage build Frontend"
          oc start-build frontend --from-dir=. --follow
