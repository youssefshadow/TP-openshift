name: OpenShift Deploy

on:
  push:
    # Vérifie bien si ta branche est 'main' ou 'master'
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to OpenShift
        uses: redhat-actions/oc-login@v1
        with:
          # Correction des noms de paramètres obligatoires
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          namespace: ${{ secrets.OPENSHIFT_NAMESPACE }}
          # Ajout indispensable pour éviter l'erreur de certificat SSL
          insecure_skip_tls_verify: true

      - name: Start backend build (json-server)
        run: |
          oc start-build json-server --from-dir=docker/backend --follow

      - name: Start frontend build (Angular)
        run: |
          oc start-build frontend --from-dir=. --follow
